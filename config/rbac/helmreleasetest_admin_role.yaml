# This rule is not used by the project atomic-munching-donut itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over testing.testing.platform.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: atomic-munching-donut
    app.kubernetes.io/managed-by: kustomize
  name: helmreleasetest-admin-role
rules:
- apiGroups:
  - testing.testing.platform.io
  resources:
  - helmreleasetests
  verbs:
  - '*'
- apiGroups:
  - testing.testing.platform.io
  resources:
  - helmreleasetests/status
  verbs:
  - get
