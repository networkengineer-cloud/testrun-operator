# This rule is not used by the project atomic-munching-donut itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the testing.testing.platform.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: atomic-munching-donut
    app.kubernetes.io/managed-by: kustomize
  name: helmreleasetest-editor-role
rules:
- apiGroups:
  - testing.testing.platform.io
  resources:
  - helmreleasetests
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - testing.testing.platform.io
  resources:
  - helmreleasetests/status
  verbs:
  - get
